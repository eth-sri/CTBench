ctbench:
  enable_heuristic_dpb: true

model:
  # The dynamically generated model wrapper path is automatically injected at runtime
  name: Customized("abcrown_adapter", "get_ctbench_model")

data:
  # The dynamically generated data path is automatically injected at runtime
  dataset: Customized("abcrown_adapter", "get_ctbench_data")

specification:
  robustness_type: verified-acc
  norm: .inf
  epsilon: 0.3             # Used directly by abcrown_certify.py

general:
  device: cuda             # Corresponds to MNBAB 'use_gpu: true'
  seed: 100                # Corresponds to MNBAB 'random_seed: 0'
  deterministic: false
  enable_incomplete_verification: true
  complete_verifier: bab   # Dynamically overridden to 'skip' if CLI '--dp-only' is passed
  root_path: ../alpha-beta-CROWN

attack:
  pgd_order: before        # Ensuring native PGD runs before complete verification
  pgd_steps: 100           # Typical default steps for abCROWN PGD
  pgd_restarts: 30         # Typical default restarts for abCROWN PGD

solver:
  batch_size: 100          # Dynamically overridden by CLI '--test-batch' argument; MNIST models are small
  bound_prop_method: alpha-crown
  alpha-crown:
    iteration: 20          # Corresponds to MNBAB 'alpha_opt_iterations: 20'
    share_alphas: true

bab:
  timeout: 1000            # Corresponds to MNBAB 'timeout: 1000'
  branching:
    method: kfsb           # Corresponds to MNBAB 'branching.method: babsr'
